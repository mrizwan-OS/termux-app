/*
 * This file was generated by the Gradle 'init' task.
 * 
 * This project uses Gradle's Java application plugin to build and run the Termux app.
 * For more details, visit: https://docs.gradle.org/current/userguide/java_application_plugin.html
 */

plugins {
    // Apply the Java plugin for building Java applications
    id 'java'
    
    // Apply the Application plugin for creating executable JARs
    id 'application'
    
    // Apply the Checkstyle plugin for code quality (optional)
    id 'checkstyle'
}

/*
 * Project metadata
 */
group = 'com.termux'
version = '1.0.0-SNAPSHOT'
description = 'Termux Application - Android terminal emulator'

/*
 * Java compatibility settings
 */
java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

/*
 * Main application class
 */
application {
    mainClass = 'com.termux.Main'
    applicationName = 'termux-app'
}

/*
 * Default JVM arguments for running the application
 */
applicationDefaultJvmArgs = [
    '-Xms256m',
    '-Xmx1024m',
    '-Dfile.encoding=UTF-8'
]

/*
 * Dependency repositories
 */
repositories {
    // Maven Central repository for most dependencies
    mavenCentral()
    
    // Google's Maven repository for Android dependencies
    maven {
        url 'https://maven.google.com'
    }
    
    // JCenter (deprecated but kept for compatibility)
    maven {
        url 'https://jcenter.bintray.com'
        metadataSources {
            mavenPom()
            artifact()
        }
    }
}

/*
 * Project dependencies
 */
dependencies {
    // ===== Core Dependencies =====
    // JSR305 for nullability annotations
    implementation 'com.google.code.findbugs:jsr305:3.0.2'
    
    // Apache Commons for utilities
    implementation 'org.apache.commons:commons-lang3:3.12.0'
    
    // Google Guava for collections and utilities
    implementation 'com.google.guava:guava:32.1.3-jre'
    
    // SLF4J for logging
    implementation 'org.slf4j:slf4j-api:2.0.9'
    implementation 'org.slf4j:slf4j-simple:2.0.9'
    
    // ===== Test Dependencies =====
    // JUnit 4 for unit testing
    testImplementation 'junit:junit:4.13.2'
    
    // JUnit 5 compatibility layer
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.0'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.0'
    testRuntimeOnly 'org.junit.vintage:junit-vintage-engine:5.10.0'
    
    // Mockito for mocking in tests
    testImplementation 'org.mockito:mockito-core:5.6.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.6.0'
    
    // AssertJ for fluent assertions
    testImplementation 'org.assertj:assertj-core:3.24.2'
}

/*
 * Test configuration
 */
test {
    // Use JUnit 5 platform
    useJUnitPlatform()
    
    // Test execution settings
    testLogging {
        // Display test events
        events = ['passed', 'skipped', 'failed', 'standardOut', 'standardError']
        
        // Show test summaries
        showExceptions = true
        showStackTraces = true
        showCauses = true
        
        // Set log level
        exceptionFormat = 'full'
    }
    
    // Max heap size for tests
    maxHeapSize = '512m'
    
    // Configure test reports
    reports {
        html.required = true
        junitXml.required = true
    }
    
    // System properties for tests
    systemProperties = [
        'java.util.logging.config.file': 'src/test/resources/logging.properties',
        'test.environment': 'unit'
    ]
}

/*
 * JAR configuration
 */
jar {
    // Include source code in JAR (optional)
    from sourceSets.main.allSource
    
    // Configure manifest
    manifest {
        attributes(
            'Implementation-Title': project.name,
            'Implementation-Version': project.version,
            'Implementation-Vendor': 'Termux Community',
            'Main-Class': application.mainClass,
            'Class-Path': configurations.runtimeClasspath.files.collect { it.name }.join(' '),
            'Built-By': System.properties['user.name'],
            'Build-Timestamp': new Date().format('yyyy-MM-dd HH:mm:ss'),
            'Build-Jdk': System.properties['java.version'],
            'Build-OS': System.properties['os.name'] + ' ' + System.properties['os.version']
        )
    }
    
    // Exclude unnecessary files
    exclude 'META-INF/*.SF'
    exclude 'META-INF/*.DSA'
    exclude 'META-INF/*.RSA'
}

/*
 * Create a distribution with all dependencies
 */
tasks.register('buildDistribution', Copy) {
    dependsOn build
    
    from('build/libs') {
        include "*-${project.version}.jar"
        rename ".*-${project.version}.jar", "${application.applicationName}.jar"
    }
    
    from('src/dist') {
        include '**/*'
    }
    
    into 'build/distributions'
}

/*
 * Checkstyle configuration
 */
checkstyle {
    // Use the latest Checkstyle version
    toolVersion = '10.12.0'
    
    // Use the default Google Checkstyle config
    config = resources.text.fromUri(
        'https://raw.githubusercontent.com/checkstyle/checkstyle/master/src/main/resources/google_checks.xml'
    )
    
    // Display errors immediately
    showViolations = true
    maxErrors = 100
    
    // Ignore test files for now
    exclude '**/test/**'
}

/*
 * Create a checkstyle configuration file if it doesn't exist
 */
tasks.register('createCheckstyleConfig') {
    def checkstyleDir = file('config/checkstyle')
    def checkstyleConfig = file('config/checkstyle/checkstyle.xml')
    
    doLast {
        if (!checkstyleDir.exists()) {
            checkstyleDir.mkdirs()
        }
        
        if (!checkstyleConfig.exists()) {
            checkstyleConfig.text = '''
                <?xml version="1.0"?>
                <!DOCTYPE module PUBLIC
                    "-//Checkstyle//DTD Checkstyle Configuration 1.3//EN"
                    "https://checkstyle.org/dtds/configuration_1_3.dtd">
                <module name="Checker">
                    <module name="TreeWalker">
                        <module name="Indentation"/>
                        <module name="LineLength">
                            <property name="max" value="120"/>
                        </module>
                        <module name="MethodName"/>
                        <module name="TypeName"/>
                    </module>
                </module>
            '''.stripIndent()
        }
    }
}

// Ensure checkstyle configuration exists before running checkstyle
tasks.withType(Checkstyle).configureEach {
    dependsOn createCheckstyleConfig
}

/*
 * Additional tasks for code quality
 */
tasks.register('lint') {
    dependsOn checkstyleMain, checkstyleTest
    description = 'Runs all linting tasks'
    group = 'verification'
}

/*
 * Task to run all quality checks
 */
tasks.register('qualityCheck') {
    dependsOn test, lint
    description = 'Runs all quality checks (tests + linting)'
    group = 'verification'
}

/*
 * Task to clean and build everything
 */
tasks.register('cleanBuild') {
    dependsOn clean, build
    description = 'Cleans and builds the project'
    group = 'build'
}

/*
 * Configure wrapper task
 */
tasks.named('wrapper') {
    distributionType = Wrapper.DistributionType.ALL
    gradleVersion = '8.5'
}

/*
 * Default tasks when running './gradlew'
 */
defaultTasks 'clean', 'build', 'test'

/*
 * Print project info on build
 */
println "Building ${project.name} version ${project.version}"
println "Java version: ${JavaVersion.current()}"
println "Gradle version: ${gradle.gradleVersion}"