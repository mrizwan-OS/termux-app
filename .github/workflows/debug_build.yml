name: Build

on:
  push:
    branches:
      - master
      - 'github-releases/**'
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APKs
        id: build
        shell: bash {0}
        env:
          PACKAGE_VARIANT: ${{ matrix.package_variant }}
        run: |
          set -e  # Exit on any error
          
          # Function to handle errors gracefully
          exit_on_error() {
            echo "ERROR: $1"
            exit 1
          }
          
          echo "========================================="
          echo "Building variant: $PACKAGE_VARIANT"
          echo "========================================="
          
          # Get commit SHA (handle PR vs push)
          if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
            GITHUB_SHA="${{ github.event.pull_request.head.sha }}"
          fi
          
          # Extract version name from build.gradle
          echo "Extracting version name from build.gradle..."
          CURRENT_VERSION_NAME_REGEX='\s+versionName "([^"]+)"$'
          CURRENT_VERSION_NAME="$(grep -m 1 -E "$CURRENT_VERSION_NAME_REGEX" ./app/build.gradle | sed -r "s/$CURRENT_VERSION_NAME_REGEX/\1/")"
          
          if [ -z "$CURRENT_VERSION_NAME" ]; then
            exit_on_error "Could not extract version name from build.gradle"
          fi
          
          echo "Current version: $CURRENT_VERSION_NAME"
          
          # Build version name with commit hash
          RELEASE_VERSION_NAME="v$CURRENT_VERSION_NAME+${GITHUB_SHA:0:7}"
          
          # Validate semantic version
          echo "Validating semantic version..."
          VERSION_WITHOUT_V="${RELEASE_VERSION_NAME/v/}"
          SEMVER_REGEX='^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'
          
          if ! echo "$VERSION_WITHOUT_V" | grep -qP "$SEMVER_REGEX"; then
            exit_on_error "Version '$VERSION_WITHOUT_V' is not valid semantic version (2.0.0)"
          fi
          
          echo "Release version: $RELEASE_VERSION_NAME"
          
          # Setup paths and names
          APK_DIR_PATH="./app/build/outputs/apk/debug"
          APK_VERSION_TAG="$RELEASE_VERSION_NAME-$PACKAGE_VARIANT-github-debug"
          APK_BASENAME_PREFIX="termux-app_$APK_VERSION_TAG"
          
          # Set environment variables for subsequent steps
          echo "APK_DIR_PATH=$APK_DIR_PATH" >> $GITHUB_ENV
          echo "APK_VERSION_TAG=$APK_VERSION_TAG" >> $GITHUB_ENV
          echo "APK_BASENAME_PREFIX=$APK_BASENAME_PREFIX" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_WITHOUT_V" >> $GITHUB_ENV
          
          echo "APK basename: $APK_BASENAME_PREFIX"
          
          # Build the APKs
          echo "========================================="
          echo "Starting build process..."
          echo "========================================="
          
          export TERMUX_APP_VERSION_NAME="$VERSION_WITHOUT_V"
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG"
          export TERMUX_PACKAGE_VARIANT="$PACKAGE_VARIANT"
          
          # Clean build to ensure no cached issues
          echo "Cleaning previous builds..."
          ./gradlew clean || echo "Clean failed but continuing..."
          
          echo "Building APKs..."
          if ! ./gradlew assembleDebug --stacktrace --no-daemon; then
            echo "Build failed. Checking logs for common issues..."
            if [ -f "$APK_DIR_PATH/output-metadata.json" ]; then
              echo "Build metadata found despite failure:"
              cat "$APK_DIR_PATH/output-metadata.json" || true
            fi
            exit_on_error "Build failed for '$APK_VERSION_TAG'"
          fi
          
          # Verify APKs were created
          echo "========================================="
          echo "Validating APKs..."
          echo "========================================="
          
          cd "$APK_DIR_PATH" || exit_on_error "Cannot access APK directory"
          ls -la
          
          # Check each architecture
          for abi in universal arm64-v8a armeabi-v7a x86_64 x86; do
            APK_FILE="${APK_BASENAME_PREFIX}_$abi.apk"
            if [ ! -f "$APK_FILE" ]; then
              echo "Missing APK for $abi architecture"
              echo "Available files:"
              ls -la
              exit_on_error "Failed to find APK: $APK_FILE"
            else
              FILE_SIZE=$(du -h "$APK_FILE" | cut -f1)
              echo "✓ $APK_FILE ($FILE_SIZE)"
            fi
          done
          
          # Generate SHA256 checksums
          echo "========================================="
          echo "Generating SHA256 checksums..."
          echo "========================================="
          
          if ! sha256sum \
            "${APK_BASENAME_PREFIX}_universal.apk" \
            "${APK_BASENAME_PREFIX}_arm64-v8a.apk" \
            "${APK_BASENAME_PREFIX}_armeabi-v7a.apk" \
            "${APK_BASENAME_PREFIX}_x86_64.apk" \
            "${APK_BASENAME_PREFIX}_x86.apk" \
            > "${APK_BASENAME_PREFIX}_sha256sums"; then
            exit_on_error "Failed to generate SHA256 checksums"
          fi
          
          echo "✓ SHA256 checksums generated successfully"
          echo "========================================="
          echo "Build completed successfully!"
          echo "========================================="
          
          cd - > /dev/null

      - name: Upload all APKs
        if: success() || failure()  # Upload even if build partially failed
        uses: actions/upload-artifact@v6
        continue-on-error: true
        with:
          name: all_apks_${{ matrix.package_variant }}
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_*.apk
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_*.sha256sums
            ${{ env.APK_DIR_PATH }}/output-metadata.json
          if-no-files-found: ignore

      - name: Attach universal APK file
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_universal
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_universal.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json
          if-no-files-found: error

      - name: Attach arm64-v8a APK file
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_arm64-v8a
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_arm64-v8a.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json
          if-no-files-found: error

      - name: Attach armeabi-v7a APK file
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_armeabi-v7a
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_armeabi-v7a.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json
          if-no-files-found: error

      - name: Attach x86_64 APK file
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_x86_64
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_x86_64.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json
          if-no-files-found: error

      - name: Attach x86 APK file
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_x86
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_x86.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json
          if-no-files-found: error

      - name: Attach sha256sums file
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_sha256sums
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_sha256sums
            ${{ env.APK_DIR_PATH }}/output-metadata.json
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build_logs_${{ matrix.package_variant }}
          path: |
            ~/.gradle/daemon/*/daemon-*.out.log
            **/build/reports/
            **/build/outputs/
          if-no-files-found: ignore
