apiVersion: apps/v1
kind: Deployment
metadata:
  name: termux-app
  namespace: default
  labels:
    app: termux-app
    circleci.com/component-name: termux-app
    circleci.com/component-version: v1.0.0
    circleci.com/environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: termux-app
  template:
    metadata:
      labels:
        app: termux-app
        circleci.com/component-name: termux-app
        circleci.com/component-version: v1.0.0
        circleci.com/environment: production
      annotations:
        circleci.com/deployment-tracking: enabled
        circleci.com/commit-sha: ${CIRCLE_SHA1}
        circleci.com/workflow-id: ${CIRCLE_WORKFLOW_ID}
    spec:
      containers:
      - name: termux-app
        image: termux-app:latest
        ports:
        - containerPort: 8080
