RELEASE_STORE_PASSWORD=Termux2024!
RELEASE_KEY_ALIAS=termux-key
RELEASE_KEY_PASSWORD=Termux2024!

# Java Toolchain Home
org.gradle.java.home=C:/Program Files/Android/Android Studio/jbr


