version: 2.1

workflows:
  daily_build:
    triggers:
      - schedule:
          cron: "0 6 * * *"
          filters:
            branches:
              only:
                - master
    jobs:
      - build-and-test:
          name: daily-build

  release_workflow:
    jobs:
      - build-and-test:
          name: release-build
          filters:
            tags:
              only: /^v.*/
      - create-release:
          name: create-github-release
          requires:
            - release-build
          filters:
            tags:
              only: /^v.*/

jobs:
  build-and-test:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    environment:
      ARCH: x86_64
      TERMUX_APK_BUILD: "true"
    steps:
      - checkout

      - run:
          name: Setup Android SDK and NDK
          command: |
            sudo apt-get update -q
            sudo apt-get install -y openjdk-17-jdk wget unzip

            echo "export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))" >> $BASH_ENV

            ANDROID_SDK_ROOT="/home/circleci/android-sdk"
            mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
              -O /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/android-cmdline
            mv /tmp/android-cmdline/cmdline-tools "${ANDROID_SDK_ROOT}/cmdline-tools/latest"

            echo "export ANDROID_HOME=${ANDROID_SDK_ROOT}" >> $BASH_ENV
            echo "export ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $BASH_ENV
            echo "export ANDROID_NDK=${ANDROID_SDK_ROOT}/ndk/25.1.8937393" >> $BASH_ENV
            echo "export PATH=\$PATH:${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools" >> $BASH_ENV
            source $BASH_ENV

            yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses
            sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" \
              "platforms;android-34" \
              "build-tools;34.0.0" \
              "platform-tools" \
              "ndk;25.1.8937393"

            echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
            echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/25.1.8937393" >> local.properties

      - run:
          name: Grant execute permission for gradlew
          command: chmod +x gradlew

      - run:
          name: Build APK
          command: ./gradlew assembleDebug

      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apks/debug

      - persist_to_workspace:
          root: .
          paths:
            - app/build/outputs/apk/debug/

  create-release:
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Plan deployment
          command: |
            circleci run release plan \
              --environment-name=production \
              --component-name=termux-app \
              --target-version="${CIRCLE_TAG}"
      - run:
          name: Create Release
          command: |
            TAG=${CIRCLE_TAG:-latest}
            gh release create "$TAG" \
              app/build/outputs/apk/debug/*.apk \
              --title "Termux $TAG" \
              --notes "Automated release"
      - run:
          name: Update deployment status to running
          command: circleci run release update "${CIRCLE_JOB}" --status=RUNNING
      - run:
          name: Update deployment status to success
          command: circleci run release update "${CIRCLE_JOB}" --status=SUCCESS
          when: on_success
      - run:
          name: Update deployment status to failed
          command: circleci run release update "${CIRCLE_JOB}" --status=FAILED
          when: on_fail
