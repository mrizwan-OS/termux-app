version: 2.1

workflows:
  daily_build:
    triggers:
      - schedule:
          cron: "0 6 * * *"
          filters:
            branches:
              only:
                - master
    jobs:
      - build-and-test:
          name: daily-build

  release_workflow:
    jobs:
      - build-and-test:
          name: release-build
          filters:
            tags:
              only: /^v.*/
      - create-release:
          name: create-github-release
          requires:
            - release-build
          filters:
            tags:
              only: /^v.*/

jobs:
  build-and-test:
    docker:
      - image: cimg/android:2023.10
    steps:
      - checkout
      - run:
          name: Setup Android SDK and NDK
          command: |
            sudo apt-get update
            sudo apt-get install -y openjdk-17-jdk
            echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))" >> $BASH_ENV
            echo "ANDROID_HOME=/opt/android-sdk" >> $BASH_ENV
            echo "ANDROID_NDK=/opt/android-sdk/ndk/26.3.11579264" >> $BASH_ENV

      # Grant execute permissions
      - run:
          name: Grant execute permission for gradlew
          command: chmod +x gradlew

      # Build debug APK
      - run:
          name: Build Debug APK
          name: Build APK
          command: |
            chmod +x gradlew
            ./gradlew assembleDebug
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apks/debug

  create-release:
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Create Release
          command: |
            TAG=${CIRCLE_TAG:-latest}
            gh release create "$TAG" \
              app/build/outputs/apk/debug/*.apk \
              --title "Termux $TAG" \
              --notes "Automated release"