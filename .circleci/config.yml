version: 2.1

# ============================================
# WORKFLOW: Daily build and test
# Runs every morning at 06:00 UTC
# ============================================
workflows:
  # Workflow for daily automated builds
  daily_build:
    triggers:
      - schedule:
          # Every day at 06:00 UTC
          cron: "0 6 * * *"
          filters:
            branches:
              only:
                - master
    jobs:
      - build-and-test:
          name: daily-build
          context: termux-build

  # Workflow for mandatory releases
  # Triggered when a new release is required
  release_workflow:
    jobs:
      - build-and-test:
          name: release-build
          context: termux-build
          filters:
            tags:
              only: /^v.*/
      - create-release:
          name: create-github-release
          context: termux-build
          requires:
            - release-build
          filters:
            tags:
              only: /^v.*/

# ============================================
# JOBS
# ============================================
jobs:
  # Main build job for Termux Android app
  build-and-test:
    machine:
      image: ubuntu-2204:current
    resource_class: arm.large
    environment:
      ARCH: aarch64
      TERMUX_APK_BUILD: "true"
    steps:
      - checkout

      # Setup Android build environment
      - run:
          name: Setup Android SDK and NDK
          command: |
            sudo apt-get update
            sudo apt-get install -y openjdk-17-jdk
            echo "ANDROID_HOME=/opt/android-sdk" >> $BASH_ENV
            echo "ANDROID_NDK=/opt/android-sdk/ndk/26.3.11579264" >> $BASH_ENV

      # Grant execute permissions
      - run:
          name: Grant execute permission for gradlew
          command: chmod +x gradlew

      # Build debug APK
      - run:
          name: Build Debug APK
          command: |
            ./gradlew assembleDebug

      # Run tests
      - run:
          name: Run tests
          command: |
            ./gradlew test

      # Store APK artifacts
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apks/debug

      # Store test results
      - store_test_results:
          path: app/build/test-results/

      # Persist artifacts for release job
      - persist_to_workspace:
          root: .
          paths:
            - app/build/outputs/apk/debug/
            - app/build/outputs/apk/release/

  # Release job - creates GitHub Release with APKs
  create-release:
    machine:
      image: ubuntu-2204:current
    steps:
      - attach_workspace:
          at: .

      # Install GitHub CLI
      - run:
          name: Install GitHub CLI
          command: |
            sudo apt-get update
            sudo apt-get install -y gh

      # Plan deployment
      - run:
          name: Plan deployment
          command: |
            circleci run release plan "${CIRCLE_JOB}" \
              --environment-name="default" \
              --component-name="${CIRCLE_PROJECT_REPONAME}" \
              --target-version="${CIRCLE_TAG}"

      # Create GitHub Release
      - run:
          name: Create GitHub Release
          command: |
            TAG=${CIRCLE_TAG:-$(git describe --tags --abbrev=0)}
            RELEASE_NAME="Termux $TAG"
              
            gh release create "$TAG" \
              app/build/outputs/apk/debug/*.apk \
              app/build/outputs/apk/release/*.apk \
              --title "$RELEASE_NAME" \
              --notes "Automated release from CircleCI" \
              --repo "$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME"

      # Update deployment status to running
      - run:
          name: Update deployment status to running
          command: circleci run release update "${CIRCLE_JOB}" --status=RUNNING

      # Store release artifacts
      - store_artifacts:
          path: app/build/outputs/apk/
          destination: apks

      # Update deployment status to success
      - run:
          name: Update deployment status to success
          command: circleci run release update "${CIRCLE_JOB}" --status=SUCCESS
          when: on_success
      - run:
          name: Update deployment status to failed
          command: circleci run release update "${CIRCLE_JOB}" --status=FAILED
          when: on_fail