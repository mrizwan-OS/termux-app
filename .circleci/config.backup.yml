version: 2.1

workflows:
  daily_build:
    triggers:
      - schedule:
          cron: "0 6 * * *"
          filters:
            branches:
              only:
                - master
    jobs:
      - build-and-test:
          name: daily-build

  release_workflow:
    jobs:
      - build-and-test:
          name: release-build
          filters:
            tags:
              only: /^v.*/
      - create-release:
          name: create-github-release
          requires:
            - release-build
          filters:
            tags:
              only: /^v.*/

jobs:
  build-and-test:
    docker:
      - image: cimg/android:2023.10
    steps:
      - checkout
      - run:
          name: Build APK
          command: |
            chmod +x gradlew
            ./gradlew assembleDebug
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apks/debug

  create-release:
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Create Release
          command: |
            TAG=${CIRCLE_TAG:-latest}
            gh release create "$TAG" \
              app/build/outputs/apk/debug/*.apk \
              --title "Termux $TAG" \
              --notes "Automated release"